name: publish
# Publishes osrsx-api, the io.osrsx.plugin Gradle plugin marker, and osrsx-testkit to GitHub Packages.
# Fires when a GitHub Release is published (tag the SDK version), or on manual dispatch.
on:
  release: { types: [published] }
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '11' }
      - run: ./gradlew publish --no-daemon
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
